<!--
  Archivo: index.html
  Página: Inicio de la web de Luna Go.
  Para qué sirve: muestra únicamente el header y un slider de obras destacadas.
  Qué se edita aquí: imágenes del slider, tipo de obra, año, textos alternativos y dots.
  Archivos relacionados:
  - css/styles.css controla la apariencia.
  - js/main.js controla el menú y el slider.
  - assets/ contiene las imágenes usadas por cada slide.
-->
<!doctype html>
<html lang="es">
<head>
  <!-- Codificación UTF-8 para usar acentos y caracteres en español sin problemas. -->
  <meta charset="utf-8">

  <!-- Hace que el diseño responda correctamente en móvil, tablet y ordenador. -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Título que aparece en la pestaña del navegador. -->
  <title>Luna Go | Inicio</title>

  <!-- Descripción breve para buscadores y vistas previas al compartir el enlace. -->
  <meta name="description" content="Página principal de Luna Go, artista visual. Obras destacadas en pintura, mural e ilustración.">

  <!-- Precarga la primera imagen del slider para que el inicio cargue más rápido. -->
  <link rel="preload" as="image" href="assets/luna-go-pintura-2026.jpg">
  <!-- Hoja de estilos principal: paleta, tipografía, header, slider y responsive. -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="home-page">
  <!--
    HEADER GLOBAL
    Este bloque aparece en todas las páginas para mantener una navegación consistente.
    Como este prototipo es HTML estático, si se cambia un enlace, una pestaña o un año,
    hay que repetir el mismo cambio en los otros archivos .html.
  -->
  <header class="site-header" data-header>
    <!--
      Marca / logotipo textual.
      El enlace siempre lleva al inicio. La tipografía se controla en .brand dentro de css/styles.css.
    -->
    <a class="brand" href="index.html" aria-label="Luna Go, ir a inicio">Luna Go</a>

    <!--
      Botón del menú móvil.
      - Solo se muestra en pantallas pequeñas mediante CSS.
      - data-menu-toggle permite que js/main.js abra y cierre la navegación.
      - aria-controls apunta al id del nav que controla.
      - aria-expanded cambia entre true/false para accesibilidad.
      Los dos <span> son las líneas del icono hamburguesa; con CSS se transforman en una X.
    -->
    <button class="menu-toggle" type="button" aria-label="Abrir menú" aria-controls="site-nav" aria-expanded="false" data-menu-toggle>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>

    <!--
      Navegación principal.
      data-site-nav conecta este nav con el JavaScript del menú móvil.
    -->
    <nav class="site-nav" id="site-nav" aria-label="Navegación principal" data-site-nav>
      <ul class="nav-list">
        <!--
          Pestaña con submenú de años: Pintura.
          - has-years aplica los estilos del desplegable.
          - data-years-menu permite que JavaScript lo abra/cierre al hacer click.
          - El hover se resuelve con CSS; el click se resuelve con JS.
          - Para agregar un año, duplica una línea <a href="pintura.html#AAAA">AAAA</a>.
        -->
        <li class="nav-item has-years" data-years-menu>
          <button class="nav-trigger" type="button" aria-haspopup="true" aria-expanded="false">Pintura</button>
          <div class="years-panel" role="menu" aria-label="Años de pintura">
            <a href="pintura.html" role="menuitem">Todo pintura</a>
            <a href="pintura.html#2026" role="menuitem">2026</a>
            <a href="pintura.html#2025" role="menuitem">2025</a>
            <a href="pintura.html#2024" role="menuitem">2024</a>
          </div>
        </li>

        <!--
          Pestaña con submenú de años: Mural.
          Edita estos enlaces cuando se agreguen nuevas páginas o secciones anuales de murales.
        -->
        <li class="nav-item has-years" data-years-menu>
          <button class="nav-trigger" type="button" aria-haspopup="true" aria-expanded="false">Mural</button>
          <div class="years-panel" role="menu" aria-label="Años de mural">
            <a href="mural.html" role="menuitem">Todo mural</a>
            <a href="mural.html#2026" role="menuitem">2026</a>
            <a href="mural.html#2025" role="menuitem">2025</a>
            <a href="mural.html#2024" role="menuitem">2024</a>
          </div>
        </li>

        <!--
          Pestaña con submenú de años: Ilustración.
          Funciona igual que Pintura y Mural: hover en ordenador, click en ordenador/móvil.
        -->
        <li class="nav-item has-years" data-years-menu>
          <button class="nav-trigger" type="button" aria-haspopup="true" aria-expanded="false">Ilustración</button>
          <div class="years-panel" role="menu" aria-label="Años de ilustración">
            <a href="ilustracion.html" role="menuitem">Toda ilustración</a>
            <a href="ilustracion.html#2026" role="menuitem">2026</a>
            <a href="ilustracion.html#2025" role="menuitem">2025</a>
            <a href="ilustracion.html#2024" role="menuitem">2024</a>
          </div>
        </li>

        <!--
          Pestañas simples: no tienen desplegable de años.
          Cada enlace apunta a su archivo HTML correspondiente.
        -->
        <li class="nav-item"><a class="nav-link" href="sobre-mi.html">Sobre mí</a></li>
        <li class="nav-item"><a class="nav-link" href="bitacora.html">Bitácora</a></li>
        <li class="nav-item"><a class="nav-link" href="tienda.html">Tienda</a></li>
      </ul>
    </nav>
  </header>

  <!--
    SLIDER PRINCIPAL
    Este es el único contenido de la página principal aparte del header.
    data-slider permite que js/main.js encuentre este bloque y active sus controles.
  -->
  <main class="home-slider" aria-label="Obras destacadas de Luna Go" data-slider>
    <!--
      Slide 1.
      - class="is-active" indica que esta obra es la visible al cargar la página.
      - data-slide permite que JavaScript incluya esta sección en la rotación.
      - El alt describe la imagen para accesibilidad y SEO.
      - .work-type muestra el tipo de obra.
      - .work-year muestra el año de elaboración.
    -->
    <section class="slide is-active" aria-label="Obra 1 de 4" data-slide>
      <img src="assets/luna-go-pintura-2026.jpg" alt="Pintura de Luna Go con figura entre formas orgánicas." draggable="false">
      <div class="slide-caption" aria-live="polite">
        <span class="work-type">Pintura</span>
        <span class="work-year">2026</span>
      </div>
    </section>

    <!-- Slide 2: reemplaza src, alt, tipo y año cuando se cargue una obra real de mural. -->
    <section class="slide" aria-label="Obra 2 de 4" data-slide>
      <img src="assets/luna-go-mural-2026.jpg" alt="Detalle de obra de Luna Go en tonos verdes, violetas y azules." draggable="false">
      <div class="slide-caption">
        <span class="work-type">Mural</span>
        <span class="work-year">2026</span>
      </div>
    </section>

    <!-- Slide 3: pensado para mostrar una obra o detalle de ilustración. -->
    <section class="slide" aria-label="Obra 3 de 4" data-slide>
      <img src="assets/luna-go-ilustracion-2026.jpg" alt="Detalle central de ilustración de Luna Go con retrato y vegetación." draggable="false">
      <div class="slide-caption">
        <span class="work-type">Ilustración</span>
        <span class="work-year">2026</span>
      </div>
    </section>

    <!-- Slide 4: ejemplo adicional para probar la rotación del slider. -->
    <section class="slide" aria-label="Obra 4 de 4" data-slide>
      <img src="assets/luna-go-pintura-detalle-2026.jpg" alt="Detalle lateral de pintura de Luna Go con formas orgánicas oscuras." draggable="false">
      <div class="slide-caption">
        <span class="work-type">Pintura</span>
        <span class="work-year">2026</span>
      </div>
    </section>

    <!-- Controles laterales del slider. data-prev y data-next conectan estos botones con js/main.js. -->
    <button class="slider-control slider-control--prev" type="button" aria-label="Ver obra anterior" data-prev>‹</button>
    <button class="slider-control slider-control--next" type="button" aria-label="Ver obra siguiente" data-next>›</button>

    <!-- Contador visual de slides. aria-hidden evita duplicar información para lectores de pantalla. -->
    <div class="slider-meta" aria-hidden="true">
      <span data-current>01</span>
      <span>/</span>
      <span data-total>04</span>
    </div>

    <!--
      Dots de navegación.
      Cada botón tiene data-dot con el índice del slide correspondiente.
      Importante: los índices empiezan en 0, no en 1.
    -->
    <div class="slider-dots" role="tablist" aria-label="Elegir obra">
      <button class="dot is-active" type="button" role="tab" aria-label="Mostrar obra 1" aria-selected="true" data-dot="0"></button>
      <button class="dot" type="button" role="tab" aria-label="Mostrar obra 2" aria-selected="false" data-dot="1"></button>
      <button class="dot" type="button" role="tab" aria-label="Mostrar obra 3" aria-selected="false" data-dot="2"></button>
      <button class="dot" type="button" role="tab" aria-label="Mostrar obra 4" aria-selected="false" data-dot="3"></button>
    </div>
  </main>

  <!-- JavaScript principal: activa menú móvil, submenús de años y slider. -->
  <script src="js/main.js"></script>
</body>
</html>
