<!--
  Archivo: sobre-mi.html
  Página: Sobre mí.
  Para qué sirve: página de presentación personal y profesional de la artista.
  Qué se edita aquí: biografía, statement artístico, trayectoria, exposiciones, residencias, formación y contacto si se desea.
  Archivos relacionados:
  - css/styles.css controla la apariencia compartida.
  - js/main.js controla el header, el menú móvil y los desplegables de años.
  Nota: esta es una página base; el contenido final se agregará dentro de <main class="page-shell">.
-->
<!doctype html>
<html lang="es">
<head>
  <!-- Codificación UTF-8 para usar acentos y caracteres en español sin problemas. -->
  <meta charset="utf-8">

  <!-- Hace que el diseño responda correctamente en móvil, tablet y ordenador. -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Título que aparece en la pestaña del navegador. -->
  <title>Luna Go | Sobre mí</title>

  <!-- Descripción breve para buscadores y vistas previas al compartir el enlace. -->
  <meta name="description" content="Sobre mí de Luna Go.">

  <!-- Hoja de estilos principal: paleta, tipografía, header, slider y responsive. -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="placeholder-page">
  <!--
    HEADER GLOBAL
    Este bloque aparece en todas las páginas para mantener una navegación consistente.
    Como este prototipo es HTML estático, si se cambia un enlace, una pestaña o un año,
    hay que repetir el mismo cambio en los otros archivos .html.
  -->
  <header class="site-header" data-header>
    <!--
      Marca / logotipo textual.
      El enlace siempre lleva al inicio. La tipografía se controla en .brand dentro de css/styles.css.
    -->
    <a class="brand" href="index.html" aria-label="Luna Go, ir a inicio">Luna Go</a>

    <!--
      Botón del menú móvil.
      - Solo se muestra en pantallas pequeñas mediante CSS.
      - data-menu-toggle permite que js/main.js abra y cierre la navegación.
      - aria-controls apunta al id del nav que controla.
      - aria-expanded cambia entre true/false para accesibilidad.
      Los dos <span> son las líneas del icono hamburguesa; con CSS se transforman en una X.
    -->
    <button class="menu-toggle" type="button" aria-label="Abrir menú" aria-controls="site-nav" aria-expanded="false" data-menu-toggle>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>

    <!--
      Navegación principal.
      data-site-nav conecta este nav con el JavaScript del menú móvil.
    -->
    <nav class="site-nav" id="site-nav" aria-label="Navegación principal" data-site-nav>
      <ul class="nav-list">
        <!--
          Pestaña con submenú de años: Pintura.
          - has-years aplica los estilos del desplegable.
          - data-years-menu permite que JavaScript lo abra/cierre al hacer click.
          - El hover se resuelve con CSS; el click se resuelve con JS.
          - Para agregar un año, duplica una línea <a href="pintura.html#AAAA">AAAA</a>.
        -->
        <li class="nav-item has-years" data-years-menu>
          <button class="nav-trigger" type="button" aria-haspopup="true" aria-expanded="false">Pintura</button>
          <div class="years-panel" role="menu" aria-label="Años de pintura">
            <a href="pintura.html" role="menuitem">Todo pintura</a>
            <a href="pintura.html#2026" role="menuitem">2026</a>
            <a href="pintura.html#2025" role="menuitem">2025</a>
            <a href="pintura.html#2024" role="menuitem">2024</a>
          </div>
        </li>

        <!--
          Pestaña con submenú de años: Mural.
          Edita estos enlaces cuando se agreguen nuevas páginas o secciones anuales de murales.
        -->
        <li class="nav-item has-years" data-years-menu>
          <button class="nav-trigger" type="button" aria-haspopup="true" aria-expanded="false">Mural</button>
          <div class="years-panel" role="menu" aria-label="Años de mural">
            <a href="mural.html" role="menuitem">Todo mural</a>
            <a href="mural.html#2026" role="menuitem">2026</a>
            <a href="mural.html#2025" role="menuitem">2025</a>
            <a href="mural.html#2024" role="menuitem">2024</a>
          </div>
        </li>

        <!--
          Pestaña con submenú de años: Ilustración.
          Funciona igual que Pintura y Mural: hover en ordenador, click en ordenador/móvil.
        -->
        <li class="nav-item has-years" data-years-menu>
          <button class="nav-trigger" type="button" aria-haspopup="true" aria-expanded="false">Ilustración</button>
          <div class="years-panel" role="menu" aria-label="Años de ilustración">
            <a href="ilustracion.html" role="menuitem">Toda ilustración</a>
            <a href="ilustracion.html#2026" role="menuitem">2026</a>
            <a href="ilustracion.html#2025" role="menuitem">2025</a>
            <a href="ilustracion.html#2024" role="menuitem">2024</a>
          </div>
        </li>

        <!--
          Pestañas simples: no tienen desplegable de años.
          Cada enlace apunta a su archivo HTML correspondiente.
        -->
        <li class="nav-item"><a class="nav-link" href="sobre-mi.html">Sobre mí</a></li>
        <li class="nav-item"><a class="nav-link" href="bitacora.html">Bitácora</a></li>
        <li class="nav-item"><a class="nav-link" href="tienda.html">Tienda</a></li>
      </ul>
    </nav>
  </header>

  <!--
    CONTENIDO PRINCIPAL DE LA PÁGINA
    page-shell centra el contenido y le da el espaciado de la maqueta base.
    Cuando esta página crezca, aquí se pueden crear secciones por año, galerías o bloques de texto.
  -->
  <main class="page-shell">
    <!-- Título visible de la página. -->
    <h1>Sobre mí</h1>

    <!-- Texto provisional. Sustituir por el contenido final de esta sección. -->
    <p>Biografía, statement y trayectoria de Luna Go.</p>
  </main>

  <!-- JavaScript principal: activa menú móvil y submenús de años. -->
  <script src="js/main.js"></script>
</body>
</html>
